<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>288UP | ช่องทางติดต่อสำรอง</title>

  <link rel="stylesheet" href="style.css" />

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
  />
</head>

<body>

<main class="page">

  <section class="section logo-section">
    <img src="assets/288up_Logo.webp" alt="Logo" class="logo-img" />
  </section>

  <section class="section banner-section">
    <div class="swiper bannerSwiper">
      <div class="swiper-wrapper">

        <div class="swiper-slide">
          <img src="assets/banner1.webp" alt="Banner 1" class="banner-img" />
        </div>

        <div class="swiper-slide">
          <img src="assets/banner2.webp" alt="Banner 2" class="banner-img" />
        </div>

        <div class="swiper-slide">
          <img src="assets/banner3.webp" alt="Banner 3" class="banner-img" />
        </div>

      </div>

      <div class="swiper-pagination"></div>
    </div>
  </section>

  <section class="section text-section">
    <div class="badge">ช่องทางติดต่อ 288UP</div>
  </section>

  <section class="section contact-section">

    <a href="https://line.me/R/ti/p/@773yzxda?oat_content=url&ts=04241923" class="contact-card line" target="_blank">
      <div class="icon"><img src="assets/linep.png" alt="LINE"></div>
      <div class="contact-text">
        <h2>Line บริการ</h2>
        <p>ติดต่อน้องแอดมินตลอด 24 ชั่วโมง</p>
      </div>
      <div class="action-badge">คลิ๊ก</div>
    </a>

    <a href="https://line.me/R/ti/p/@773yzxda?oat_content=url&ts=04241923" class="contact-card line" target="_blank">
      <div class="icon"><img src="assets/linep.png" alt="LINE"></div>
      <div class="contact-text">
        <h2>ไลน์สำรอง</h2>
        <p>สำหรับติดต่อน้องแอดมินเร่งด่วน</p>
      </div>
      <div class="action-badge">คลิ๊ก</div>
    </a>

    <a href="https://bit.ly/288up-kenni" class="contact-card telegram" target="_blank">
      <div class="icon"><img src="assets/telegram.png" alt="Telegram"></div>
      <div class="contact-text">
        <h2>Telegram</h2>
        <p>ช่องทางสำรอง ตอบกลับไว</p>
      </div>
      <div class="action-badge">คลิ๊ก</div>
    </a>

    <a href="https://bit.ly/288up-kenni" class="contact-card livechat" target="_blank">
      <div class="icon"><img src="assets/livechat.png" alt="Live Chat"></div>
      <div class="contact-text">
        <h2>Live Chat</h2>
        <p>พูดคุยกับทีมงานทันที</p>
      </div>
      <div class="action-badge">คลิ๊ก</div>
    </a>

    <a href="https://bit.ly/288up-kenni" class="contact-card website" target="_blank">
      <div class="icon"><img src="assets/288up.jpeg" alt="Website"></div>
      <div class="contact-text">
        <h2>ทางเข้าเว็บไซต์หลัก</h2>
        <p>เข้าใช้งานหน้าเว็บไซต์</p>
      </div>
      <div class="action-badge">คลิ๊ก</div>
    </a>

    <a href="https://bit.ly/288up-kenni" class="contact-card whatsapp" target="_blank">
      <div class="icon"><img src="assets/whatsapp.png" alt="Whatsapp"></div>
      <div class="contact-text">
        <h2>Whatsapp</h2>
        <p>ติดตาม Whatsapp ของทางเรา</p>
      </div>
      <div class="action-badge">คลิ๊ก</div>
    </a>

  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
  new Swiper(".bannerSwiper", {
    loop: true,
    effect: "fade",
    speed: 1000,

    fadeEffect: {
      crossFade: true
    },

    autoplay: {
      delay: 3000,
      disableOnInteraction: false
    },

    pagination: {
      el: ".swiper-pagination",
      clickable: true
    }
  });
</script>

</body>
</html>
